<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>YTSnap — Convertidor de YouTube a MP3, MP4 y WAV gratis</title>
  <meta name="description" content="Convierte videos de YouTube a MP3, MP4 y WAV gratis. Rápido, sin registro y sin límites. El mejor convertidor de YouTube online."/>
  <meta name="keywords" content="convertidor youtube mp3, youtube to mp3, descargar youtube, youtube mp4, convertir youtube gratis, ytsnap"/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://ytsnap.up.railway.app"/>
  <meta property="og:title" content="YTSnap — Convertidor de YouTube gratis"/>
  <meta property="og:description" content="Convierte cualquier video de YouTube a MP3, MP4 o WAV en segundos. Sin registro, sin límites."/>
  <meta property="og:url" content="https://ytsnap.up.railway.app"/>
  <meta property="og:type" content="website"/>
  <meta name="twitter:card" content="summary"/>
  <meta name="twitter:title" content="YTSnap — Convertidor de YouTube gratis"/>
  <meta name="twitter:description" content="Convierte YouTube a MP3, MP4 y WAV gratis y sin registro."/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #ff2d2d;
      --red-soft: #ff5a5a;
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #181818;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.14);
      --text: #f0f0f0;
      --muted: #666;
      --muted2: #444;
      --success: #1db954;
    }

    html { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* ── Fondo animado ── */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 12s ease-in-out infinite;
    }
    .bg-orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(255,45,45,0.12) 0%, transparent 70%);
      top: -150px; left: -150px;
      animation-delay: 0s;
    }
    .bg-orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(255,45,45,0.07) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation-delay: -6s;
    }
    @keyframes orbFloat {
      0%,100% { transform: translate(0,0) scale(1); }
      33%     { transform: translate(30px,-20px) scale(1.05); }
      66%     { transform: translate(-20px,15px) scale(.97); }
    }

    /* ── Wrapper ── */
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      animation: wrapIn .7s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes wrapIn {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo pill ── */
    .logo-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,45,45,0.1);
      border: 1px solid rgba(255,45,45,0.2);
      border-radius: 99px;
      padding: 6px 14px 6px 8px;
      margin-bottom: 28px;
      animation: fadeUp .5s .1s both;
    }
    .logo-pill-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 10px var(--red);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 6px var(--red); transform: scale(1); }
      50%     { box-shadow: 0 0 16px var(--red); transform: scale(1.15); }
    }
    .logo-pill span {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,45,45,0.8);
      letter-spacing: .04em;
    }

    /* ── Título ── */
    .title {
      font-family: 'DM Serif Display', serif;
      font-size: 42px;
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 10px;
      animation: fadeUp .5s .15s both;
    }
    .title em {
      font-style: italic;
      background: linear-gradient(135deg, var(--red), var(--red-soft));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 15px;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 40px;
      animation: fadeUp .5s .2s both;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      animation: fadeUp .5s .25s both;
      transition: border-color .3s;
    }
    .card:focus-within {
      border-color: var(--border-hover);
    }

    /* ── Input URL ── */
    .field { margin-bottom: 20px; }
    .field-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }
    .input-row {
      display: flex;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-row:focus-within {
      border-color: rgba(255,45,45,0.4);
      box-shadow: 0 0 0 3px rgba(255,45,45,0.08);
    }
    .input-row svg {
      flex-shrink: 0;
      margin-left: 14px;
      color: var(--muted2);
      transition: color .2s;
    }
    .input-row:focus-within svg { color: var(--red-soft); }
    .input-row input {
      flex: 1;
      padding: 13px 14px;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
    }
    .input-row input::placeholder { color: var(--muted2); }

    /* ── Paste button ── */
    .paste-btn {
      margin-right: 8px;
      padding: 6px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      transition: all .2s;
    }
    .paste-btn:hover { color: var(--text); border-color: var(--border-hover); }
    .paste-btn:active { transform: scale(.95); }

    /* ── Formatos ── */
    .formats-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: block;
    }
    .formats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    .fmt {
      padding: 14px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s cubic-bezier(.34,1.56,.64,1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      position: relative;
      overflow: hidden;
    }
    .fmt::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,45,45,0.1), transparent);
      opacity: 0;
      transition: opacity .2s;
    }
    .fmt:hover { border-color: var(--border-hover); color: var(--text); transform: translateY(-2px); }
    .fmt.on {
      border-color: rgba(255,45,45,0.5);
      color: var(--text);
      background: rgba(255,45,45,0.06);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(255,45,45,0.12);
    }
    .fmt.on::after { opacity: 1; }
    .fmt-icon { font-size: 20px; }
    .fmt-ext {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
    }
    .fmt-desc { font-size: 10px; color: var(--muted); }
    .fmt.on .fmt-desc { color: rgba(255,90,90,0.7); }

    /* ── Botón principal ── */
    #btn {
      width: 100%;
      padding: 15px;
      background: var(--red);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .15s, box-shadow .2s, background .2s;
      letter-spacing: .01em;
    }
    #btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: skewX(-20deg);
      transition: left .5s;
    }
    #btn:hover {
      background: var(--red-soft);
      box-shadow: 0 8px 30px rgba(255,45,45,0.35);
      transform: translateY(-1px);
    }
    #btn:hover::before { left: 150%; }
    #btn:active { transform: translateY(0) scale(.99); box-shadow: none; }
    #btn:disabled {
      background: var(--surface2);
      color: var(--muted);
      box-shadow: none;
      transform: none;
      cursor: not-allowed;
    }
    #btn:disabled::before { display: none; }

    .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    /* ── Spinner ── */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning .spinner { display: block; }
    .spinning .btn-arrow { display: none; }

    /* ── Progress ── */
    .progress-wrap {
      margin-top: 16px;
      display: none;
      animation: fadeUp .3s both;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .progress-status {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }
    .progress-pct {
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .progress-track {
      height: 4px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red), var(--red-soft));
      border-radius: 99px;
      width: 0;
      transition: width .4s ease;
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0; top: 50%;
      transform: translateY(-50%);
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 8px rgba(255,45,45,0.8);
      opacity: 0;
      transition: opacity .3s;
    }
    .progress-fill.active::after { opacity: 1; }

    /* ── Mensaje resultado ── */
    .result {
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
      animation: resultIn .4s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes resultIn {
      from { opacity: 0; transform: scale(.95) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .result.info {
      display: block;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .result.ok {
      display: block;
      background: rgba(29,185,84,0.08);
      border: 1px solid rgba(29,185,84,0.2);
      color: #b3f0c8;
    }
    .result.err {
      display: block;
      background: rgba(255,45,45,0.06);
      border: 1px solid rgba(255,45,45,0.2);
      color: #ffaaaa;
    }
    .result-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 4px;
      opacity: .7;
    }

    a.dl {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 11px 20px;
      background: var(--success);
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .01em;
      transition: all .2s;
      box-shadow: 0 4px 16px rgba(29,185,84,0.3);
    }
    a.dl:hover {
      background: #22d460;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(29,185,84,0.4);
    }
    a.dl:active { transform: none; }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
      position: relative;
      animation: fadeUp .5s .3s both;
    }

    /* ── Stats row ── */
    .stats {
      display: flex;
      gap: 0;
      animation: fadeUp .5s .35s both;
    }
    .stat {
      flex: 1;
      text-align: center;
      padding: 0 16px;
      border-right: 1px solid var(--border);
    }
    .stat:last-child { border-right: none; }
    .stat-num {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      display: block;
      margin-bottom: 2px;
    }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="wrapper">

  <div class="logo-pill">
    <div class="logo-pill-dot"></div>
    <span>Servicio activo</span>
  </div>

  <h1 class="title">Convierte cualquier<br>video de <em>YouTube</em></h1>
  <p class="subtitle">Descarga en MP3, WAV o MP4 en segundos.<br>Sin registro, sin límites.</p>

  <div class="card">

    <div class="field">
      <span class="field-label">URL del video</span>
      <div class="input-row">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
        </svg>
        <input id="url" type="text" placeholder="https://www.youtube.com/watch?v=..."/>
        <button class="paste-btn" id="paste-btn">Pegar</button>
      </div>
    </div>

    <span class="formats-label">Formato</span>
    <div class="formats">
      <button class="fmt on" data-f="mp3">
        <span class="fmt-icon">🎵</span>
        <span class="fmt-ext">MP3</span>
        <span class="fmt-desc">Audio</span>
      </button>
      <button class="fmt" data-f="wav">
        <span class="fmt-icon">🎧</span>
        <span class="fmt-ext">WAV</span>
        <span class="fmt-desc">Sin pérdida</span>
      </button>
      <button class="fmt" data-f="mp4">
        <span class="fmt-icon">🎬</span>
        <span class="fmt-ext">MP4</span>
        <span class="fmt-desc">Video HD</span>
      </button>
    </div>

    <button id="btn">
      <div class="btn-inner">
        <div class="spinner"></div>
        <svg class="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
        <span id="btn-text">Convertir ahora</span>
      </div>
    </button>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-header">
        <span class="progress-status" id="progress-status">Procesando...</span>
        <span class="progress-pct" id="progress-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="result" id="result"></div>

  </div>

  <div class="divider"></div>

  <div class="stats">
    <div class="stat">
      <span class="stat-num">MP3</span>
      <span class="stat-label">Audio comprimido</span>
    </div>
    <div class="stat">
      <span class="stat-num">WAV</span>
      <span class="stat-label">Máxima calidad</span>
    </div>
    <div class="stat">
      <span class="stat-num">MP4</span>
      <span class="stat-label">Video completo</span>
    </div>
  </div>

</div>

<script>
  async function pasteUrl() {
    try {
      const text = await navigator.clipboard.readText();
      document.getElementById('url').value = text;
    } catch { }
  }

  let fmt = 'mp3';
  document.querySelectorAll('.fmt').forEach(b => {
    b.onclick = () => {
      document.querySelectorAll('.fmt').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      fmt = b.dataset.f;
    };
  });

  function setResult(html, type) {
    const el = document.getElementById('result');
    el.innerHTML = html;
    el.className = 'result ' + type;
  }

  let timer;
  function startProgress() {
    let p = 0;
    const fill = document.getElementById('progress-fill');
    const pct  = document.getElementById('progress-pct');
    document.getElementById('progress-wrap').style.display = 'block';
    fill.classList.add('active');
    const statuses = ['Conectando...','Descargando...','Convirtiendo...','Finalizando...'];
    let si = 0;
    timer = setInterval(() => {
      p = p < 88 ? p + Math.random() * 4 : p;
      fill.style.width = p + '%';
      pct.textContent = Math.round(p) + '%';
      const idx = Math.floor((p / 88) * statuses.length);
      document.getElementById('progress-status').textContent = statuses[Math.min(idx, statuses.length-1)];
    }, 500);
  }

  function stopProgress() {
    clearInterval(timer);
    const fill = document.getElementById('progress-fill');
    fill.style.width = '100%';
    document.getElementById('progress-pct').textContent = '100%';
    document.getElementById('progress-status').textContent = 'Completado';
    setTimeout(() => {
      document.getElementById('progress-wrap').style.display = 'none';
      fill.style.width = '0';
      fill.classList.remove('active');
    }, 800);
  }

  async function convert() {
    const url = document.getElementById('url').value.trim();
    if (!url) {
      setResult('<div class="result-title">Error</div>Introduce una URL de YouTube válida.', 'err');
      return;
    }
    const btn = document.getElementById('btn');
    const btnText = document.getElementById('btn-text');
    btn.disabled = true;
    btn.classList.add('spinning');
    btnText.textContent = 'Procesando...';
    document.getElementById('result').className = 'result';
    startProgress();

    try {
      const res  = await fetch('/convert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, format: fmt })
      });
      const data = await res.json();
      stopProgress();
      if (!res.ok) {
        setResult(`<div class="result-title">Error</div>${data.error || 'No se pudo convertir el video.'}`, 'err');
      } else {
        setResult(`
          <div class="result-title">Listo</div>
          Tu archivo está listo para descargar.
          <br>
          <a class="dl" href="/download/${data.id}/${data.format}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Descargar .${data.format.toUpperCase()}
          </a>`, 'ok');
      }
    } catch {
      stopProgress();
      setResult('<div class="result-title">Error de conexión</div>No se pudo conectar con el servidor.', 'err');
    } finally {
      btn.disabled = false;
      btn.classList.remove('spinning');
      btnText.textContent = 'Convertir ahora';
    }
  }

  // Event Listeners (Solución al error CSP)
  document.getElementById('paste-btn').addEventListener('click', pasteUrl);
  document.getElementById('btn').addEventListener('click', convert);

  document.getElementById('url').addEventListener('keydown', e => {
    if (e.key === 'Enter') convert();
  });
</script>
</body>
</html>
